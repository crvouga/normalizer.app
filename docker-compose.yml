name: normalizer-app

services:
  db:
    image: postgres:15-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 2s
      retries: 3

  s3:
    image: minio/minio
    ports:
      - '9010:9000'
      - '9011:9001'
    env_file:
      - .env
    volumes:
      - s3_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 2

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    env_file:
      - .env
    environment:
      # Use localhost URLs so presigned URLs work in the browser
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5433/postgres?sslmode=disable
      S3_ENDPOINT: http://localhost:9010
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_healthy
    command: ['/bin/sh', './docker-entrypoint.sh']

volumes:
  postgres_data:
  s3_data:
  node_modules:
