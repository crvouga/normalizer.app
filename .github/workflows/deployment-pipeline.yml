name: Deployment Pipeline

on:
  push:
    branches:
      - main

env:
  BUN_VERSION: latest

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check:once

  circular-deps:
    name: Circular Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for circular dependencies
        run: bun run circular

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup environment from template
        run: |
          cp env-template.txt .env
          # Override with test-specific bucket name
          sed -i 's/S3_BUCKET=main/S3_BUCKET=test-bucket/' .env
          echo "✅ Environment file created from template"
          cat .env

      - name: Start services with docker-compose
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          source .env
          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until docker compose exec -T db pg_isready -U postgres; do sleep 1; done'
          echo "✅ PostgreSQL is ready"

          echo "Waiting for MinIO..."
          MINIO_PORT=$(echo $S3_ENDPOINT | grep -oP ':\K[0-9]+')
          timeout 30 bash -c "until curl -f ${S3_ENDPOINT}/minio/health/live 2>/dev/null; do sleep 1; done"
          echo "✅ MinIO is ready"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        run: |
          set -a
          source .env
          set +a
          bun run db:migrate

      - name: Migration success
        run: echo "✅ Database migrations completed successfully"

      - name: Run tests
        run: |
          set -a
          source .env
          set +a
          bun test

      - name: Stop services
        if: always()
        run: docker compose down -v

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup environment from template
        run: |
          cp env-template.txt .env
          # Override with test-specific bucket name
          sed -i 's/S3_BUCKET=main/S3_BUCKET=test-bucket/' .env
          echo "✅ Environment file created from template"
          cat .env

      - name: Start services with docker-compose
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          source .env
          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until docker compose exec -T db pg_isready -U postgres; do sleep 1; done'
          echo "✅ PostgreSQL is ready"

          echo "Waiting for MinIO..."
          timeout 30 bash -c "until curl -f ${S3_ENDPOINT}/minio/health/live 2>/dev/null; do sleep 1; done"
          echo "✅ MinIO is ready"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls @playwright/test | grep @playwright/test | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Run database migrations
        run: |
          set -a
          source .env
          set +a
          bun run db:migrate

      - name: Run E2E tests
        run: |
          set -a
          source .env
          set +a
          bun run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

  migrate-production:
    name: Migrate Production Database
    runs-on: ubuntu-latest
    needs: [format, type-check, circular-deps, test, test-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL secret is not set"
            echo "Please add DATABASE_URL to your GitHub repository secrets"
            exit 1
          fi
          echo "✅ DATABASE_URL secret is configured"

      - name: Run production database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Production migration success
        run: echo "🚀 Production database migrations completed successfully"
