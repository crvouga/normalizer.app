<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./ui/sparkles.svg" />
    <title>normalizer.app</title>
    <script>
      // Prevents flash of light mode by applying dark class immediately
      try {
        var t = localStorage.getItem('theme-storage-key');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark');
      } catch {}
    </script>
    <script type="module" src="./client.tsx" async></script>
    <link rel="stylesheet" href="./client.css" />
  </head>

  <body class="bg-slate-50 dark:bg-slate-900">
    <div id="root"></div>
  </body>
</html>
